<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A股板块情绪监控</title>
<script src="chart.min.js"></script>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --border:#e4e7eb; --text:#1f2329; --muted:#8a9099;
    --up:#d9303e; --down:#2e7d32; --accent:#2b6cb0; --accent2:#dd6b20;
    --pos-bg:#fde7e9; --neg-bg:#e7f3e8; --shadow:0 1px 3px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
  .container{max-width:1180px;margin:0 auto;padding:20px}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  h1{margin:0;font-size:22px}
  .meta{color:var(--muted);font-size:13px}
  .summary{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
  .summary-text{font-size:15px;line-height:1.8;margin-bottom:14px}
  .market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .market-item{background:#fafbfc;border:1px solid var(--border);border-radius:6px;padding:8px 12px}
  .market-item .label{font-size:12px;color:var(--muted)}
  .market-item .val{font-size:18px;font-weight:600}
  .up{color:var(--up)} .down{color:var(--down)}
  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
  .tabs button{padding:8px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--muted);border-bottom:2px solid transparent}
  .tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tab-content{display:none}
  .tab-content.active{display:block}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
  .panel h2{margin:0 0 10px;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
  th{background:#fafbfc;color:var(--muted);font-weight:600;white-space:nowrap}
  tr:hover td{background:#fafbfc}
  .score-cell{font-weight:700;font-size:14px;text-align:center;border-radius:4px}
  .level{font-size:12px;padding:1px 6px;border-radius:3px;background:#eef1f4;color:var(--text)}
  .rep{font-size:12px;color:var(--muted);line-height:1.7}
  .tag{font-size:10px;padding:0 4px;border-radius:2px;margin-left:2px}
  .tag-up{background:var(--up);color:#fff}
  .tag-dn{background:var(--down);color:#fff}
  .query-box{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;position:relative}
  .query-box input{flex:1;min-width:240px;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px}
  .query-box button{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
  .query-box button:hover{opacity:.9}
  .suggest{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);max-height:260px;overflow:auto;z-index:10;display:none}
  .suggest div{padding:8px 12px;cursor:pointer}
  .suggest div:hover{background:#eef4fb}
  #queryResult{margin-bottom:12px}
  .result-card{background:#fafbfc;border:1px solid var(--border);border-radius:6px;padding:12px 14px}
  .result-card .name{font-size:16px;font-weight:600}
  .result-card .stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;font-size:13px}
  .result-card .stats span b{font-size:15px}
  .chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:var(--shadow);height:420px;position:relative}
  .corr-note{font-size:13px;color:var(--muted);margin:8px 0 0}
  .corr-note b{color:var(--accent2)}
  .empty{color:var(--muted);text-align:center;padding:30px}
  .badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:3px;background:#eef1f4;margin-left:6px;color:var(--muted)}
  .small{font-size:12px;color:var(--muted)}
  /* 表格滚动容器（移动端横向滑动） */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-wrap table{min-width:560px}
  #allTable .table-wrap table{min-width:640px}

  /* —— 移动端适配 —— */
  @media(max-width:640px){
    .container{padding:12px}
    h1{font-size:18px}
    .meta{font-size:12px;width:100%}
    .summary{padding:12px}
    .summary-text{font-size:14px;line-height:1.7}
    .market-grid{grid-template-columns:repeat(2,1fr)}
    .market-item .val{font-size:16px}
    .tabs{gap:0}
    .tabs button{padding:8px 10px;font-size:13px;flex:1;text-align:center}
    .panel{padding:10px 12px}
    .panel h2{font-size:14px}
    th,td{padding:6px 6px;font-size:12px;white-space:nowrap}
    .rep{font-size:11px}
    .query-box input{min-width:0;flex:1 1 60%;font-size:13px;padding:8px 10px}
    .query-box button{padding:8px 14px;font-size:13px}
    .chart-wrap{height:300px;padding:10px}
    .result-card{padding:10px 12px}
    .result-card .name{font-size:15px}
    .result-card .stats{gap:10px 14px;font-size:12px}
    .result-card .stats span b{font-size:14px}
    .corr-note{font-size:12px}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>A股板块情绪监控</h1>
    <div class="meta">最新交易日：<b id="lastDate">-</b> ｜ 更新：<span id="updated">-</span> ｜ 共 <span id="totalDays">0</span> 个交易日</div>
  </header>

  <section class="summary">
    <div class="summary-text" id="summary">加载中...</div>
    <div class="market-grid" id="marketGrid"></div>
  </section>

  <nav class="tabs">
    <button data-tab="overview" class="active">每日总览</button>
    <button data-tab="query">板块查询</button>
    <button data-tab="all">全部评分</button>
  </nav>

  <section id="tab-overview" class="tab-content active">
    <div class="panel"><h2>情绪最强 Top 10</h2><div id="top10"></div></div>
    <div class="panel"><h2>情绪最弱 Bottom 10</h2><div id="bottom10"></div></div>
  </section>

  <section id="tab-query" class="tab-content">
    <div class="query-box">
      <input id="sectorInput" placeholder="输入板块名称或关键词（如：人工智能、半导体、CPO、华为、机器人）" autocomplete="off">
      <button id="queryBtn">查询</button>
      <div class="suggest" id="suggest"></div>
    </div>
    <div id="queryResult"></div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <p class="corr-note" id="corrNote"></p>
  </section>

  <section id="tab-all" class="tab-content">
    <div class="panel">
      <input id="filterInput" placeholder="筛选板块名称/方向..." style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px">
      <div id="allTable"></div>
    </div>
  </section>
</div>

<script src="data.js"></script>
<script>
const D = window.SENTIMENT_DATA || {meta:{},sectors:{},indices:{},latest:null};
let chartObj = null;

// ---------- 工具函数 ----------
function fmtPct(v){ if(v===null||v===undefined||isNaN(v)) return '-'; return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function pctClass(v){ if(v===null||v===undefined||isNaN(v)) return ''; return v>=0?'up':'down'; }
function scoreBg(s){
  // -100 绿 → 0 灰 → +100 红
  if(s===null||s===undefined||isNaN(s)) return '#eef1f4';
  const t=(s+100)/200; // 0~1
  if(t>=0.5){ const k=(t-0.5)*2; return `rgba(217,48,62,${0.15+0.55*k})`; }
  const k=(0.5-t)*2; return `rgba(46,125,50,${0.15+0.55*k})`;
}
function pearson(a,b){
  const n=Math.min(a.length,b.length); if(n<2) return 0;
  let ma=0,mb=0; for(let i=0;i<n;i++){ma+=a[i];mb+=b[i];} ma/=n;mb/=n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){const x=a[i]-ma,y=b[i]-mb;num+=x*y;da+=x*x;db+=y*y;}
  const d=Math.sqrt(da*db); return d?num/d:0;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------- 渲染头部/总结 ----------
function renderHead(){
  const m=D.meta||{};
  document.getElementById('lastDate').textContent = m.lastDate||'-';
  document.getElementById('updated').textContent = m.updated? m.updated.replace('T',' ').slice(0,16):'-';
  document.getElementById('totalDays').textContent = m.totalDays||0;
  const L=D.latest; if(!L){ document.getElementById('summary').textContent='暂无数据'; return; }
  // 总结文本（从报告summary.txt逻辑重建：用market+top3/bottom3）
  const mk=L.market||{};
  const date=L.date||'';
  const md = date.slice(5,7), dd=date.slice(8,10);
  let cmt = mk.comment||''; cmt = cmt.replace('当前市场','');
  if(cmt.indexOf('过去一年')>=0) cmt = cmt.split('过去一年')[0].replace(/。$/,'');
  const top = (L.top10||[]).slice(0,3).map(s=>s.name).join('、');
  const bot = (L.bottom10||[]).slice(0,3).map(s=>s.name).join('、');
  const leadUp = topDir(L.top10), leadDn = topDir(L.bottom10);
  let txt = `${md}月${dd}日两市成交${mk.total_amount_yi||'-'}亿，${mk.up_count??'-'}涨/${mk.down_count??'-'}跌，涨停${mk.limit_up_count??'-'}/跌停${mk.limit_down_count??'-'}，${cmt}。情绪最强：${top||'无'}；最弱：${bot||'无'}。领涨方向集中在${leadUp}，${leadDn}领跌。`;
  if(txt.length>200) txt = txt.slice(0,199)+'…';
  document.getElementById('summary').innerHTML = esc(txt);
  // 市场指标卡
  const grid=document.getElementById('marketGrid');
  const items=[
    ['两市成交额', (mk.total_amount_yi||'-')+' 亿'],
    ['涨停 / 跌停', `<span class="up">${mk.limit_up_count??'-'}</span> / <span class="down">${mk.limit_down_count??'-'}</span>`],
    ['上涨 / 下跌', `<span class="up">${mk.up_count??'-'}</span> / <span class="down">${mk.down_count??'-'}</span>`],
    ['上涨占比', (mk.up_ratio!=null?mk.up_ratio+'%':'-')],
  ];
  (L.indices||[]).forEach(idx=>{
    items.push([idx.name, `<span class="${pctClass(idx.change_pct)}">${fmtPct(idx.change_pct)}</span>`]);
  });
  grid.innerHTML = items.map(([l,v])=>`<div class="market-item"><div class="label">${l}</div><div class="val">${v}</div></div>`).join('');
}
function topDir(arr){
  const c={}; (arr||[]).forEach(s=>{c[s.direction]=(c[s.direction]||0)+1;});
  const e=Object.entries(c); if(!e.length) return '无';
  e.sort((a,b)=>b[1]-a[1]); return e[0][0];
}

// ---------- 渲染板块表格 ----------
function renderTable(sectors, container){
  if(!sectors||!sectors.length){ container.innerHTML='<div class="empty">无数据</div>'; return; }
  let rows = sectors.map((s,i)=>{
    const lu=s.limit_up, ld=s.limit_down;
    const luStr = (lu!=null||ld!=null)? `${lu??0}/${ld??0}`:'-';
    const reps = (s.representative||[]).map(r=>{
      const tag = r.is_limit_up? '<span class="tag tag-up">涨停</span>' : (r.is_limit_down?'<span class="tag tag-dn">跌停</span>':'');
      return `${esc(r.name)} <span class="${pctClass(r.change_pct)}">${fmtPct(r.change_pct)}</span>${tag}`;
    }).join('；');
    return `<tr>
      <td>${i+1}</td>
      <td><b>${esc(s.name)}</b> <span class="badge">${esc(s.direction||'')}</span></td>
      <td class="score-cell" style="background:${scoreBg(s.score)};color:${Math.abs(s.score)>40?'#fff':'inherit'}">${s.score}</td>
      <td><span class="level">${esc(s.level||'')}</span></td>
      <td class="${pctClass(s.change_pct)}">${fmtPct(s.change_pct)}</td>
      <td>${s.volume_ratio!=null?s.volume_ratio:'-'}</td>
      <td>${s.turnover_rate!=null?s.turnover_rate:'-'}</td>
      <td>${luStr}</td>
      <td class="rep">${reps||'-'}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `<div class="table-wrap"><table><thead><tr>
    <th>#</th><th>板块</th><th>情绪分</th><th>等级</th><th>涨跌幅</th><th>量比</th><th>换手%</th><th>涨停/跌停</th><th>代表个股</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ---------- 全部评分表 ----------
function renderAll(filter){
  const L=D.latest; if(!L){ return; }
  let arr = (L.all_sectors||[]).slice().sort((a,b)=>b.score-a.score);
  if(filter){ const f=filter.toLowerCase(); arr=arr.filter(s=>s.name.toLowerCase().includes(f)||(s.direction||'').toLowerCase().includes(f)); }
  const html = arr.map((s,i)=>`<tr>
    <td>${i+1}</td><td><b>${esc(s.name)}</b> <span class="badge">${esc(s.direction||'')}</span></td>
    <td class="score-cell" style="background:${scoreBg(s.score)};color:${Math.abs(s.score)>40?'#fff':'inherit'}">${s.score}</td>
    <td><span class="level">${esc(s.level||'')}</span></td>
    <td class="${pctClass(s.change_pct)}">${fmtPct(s.change_pct)}</td>
    <td>${s.volume_ratio!=null?s.volume_ratio:'-'}</td>
    <td>${s.turnover_rate!=null?s.turnover_rate:'-'}</td>
    <td>${s.change_pct_5d!=null?`<span class="${pctClass(s.change_pct_5d)}">${fmtPct(s.change_pct_5d)}</span>`:'-'}</td>
    <td>${(s.limit_up!=null||s.limit_down!=null)?(s.limit_up??0)+'/'+(s.limit_down??0):'-'}</td>
  </tr>`).join('');
  document.getElementById('allTable').innerHTML = `<div class="table-wrap"><table><thead><tr>
    <th>#</th><th>板块</th><th>情绪分</th><th>等级</th><th>涨跌幅</th><th>量比</th><th>换手%</th><th>5日</th><th>涨停/跌停</th>
  </tr></thead><tbody>${html}</tbody></table></div>`;
}

// ---------- 板块查询 ----------
function findSectors(q){
  if(!q) return [];
  const ql=q.toLowerCase();
  const res=[];
  for(const code in D.sectors){
    const s=D.sectors[code];
    if((s.name||'').toLowerCase().includes(ql) || (s.direction||'').toLowerCase().includes(ql) || code.toLowerCase().includes(ql)){
      res.push({code,name:s.name,direction:s.direction});
    }
  }
  return res.slice(0,12);
}
function showSuggest(q){
  const list=findSectors(q);
  const box=document.getElementById('suggest');
  if(!list.length){ box.style.display='none'; return; }
  box.innerHTML = list.map(s=>`<div data-code="${s.code}">${esc(s.name)} <span class="small">${esc(s.direction||'')}</span></div>`).join('');
  box.style.display='block';
  box.querySelectorAll('div').forEach(el=>{
    el.onclick=()=>{ document.getElementById('sectorInput').value=el.textContent.split(' ')[0]; box.style.display='none'; doQuery(); };
  });
}
function doQuery(){
  const q=document.getElementById('sectorInput').value.trim();
  if(!q){ return; }
  const list=findSectors(q);
  if(!list.length){ document.getElementById('queryResult').innerHTML='<div class="empty">未找到匹配板块</div>'; document.getElementById('corrNote').textContent=''; return; }
  // 取第一个匹配（最相关）
  drawSectorChart(list[0].code);
}

function drawSectorChart(code){
  const s=D.sectors[code]; if(!s){ return; }
  const series=s.series||[];
  const res=document.getElementById('queryResult');
  if(!series.length){ res.innerHTML=`<div class="result-card"><div class="name">${esc(s.name)}</div><div class="empty">暂无历史数据（首次采集后次日可见趋势）</div></div>`; document.getElementById('corrNote').textContent=''; return; }
  const latest=series[series.length-1];
  // 计算与各指数的相关度
  const dates = series.map(x=>x.date);
  const scores = series.map(x=>x.score);
  let bestIdx=null, bestR=0, bestIdxSeries=[];
  const idxList = D.meta && D.meta.lastDate ? Object.values(D.indices) : [];
  for(const idx of idxList){
    const is=idx.series||[];
    // 按日期对齐
    const map={}; is.forEach(x=>{map[x.date]=x.change_pct;});
    const aligned=[]; let okCount=0;
    for(const d of dates){ if(map[d]!==undefined){ aligned.push(map[d]); okCount++; } else aligned.push(null); }
    if(okCount<3) continue;
    // 取双方都有值的子序列
    const a=[],b=[];
    for(let i=0;i<series.length;i++){ if(aligned[i]!==null && scores[i]!==null){ a.push(scores[i]); b.push(aligned[i]); } }
    const r=pearson(a,b);
    if(Math.abs(r)>Math.abs(bestR)){ bestR=r; bestIdx=idx; bestIdxSeries=aligned; }
  }
  // 渲染结果卡
  res.innerHTML = `<div class="result-card">
    <div class="name">${esc(s.name)} <span class="badge">${esc(s.direction||'')}</span></div>
    <div class="stats">
      <span>最新情绪分：<b style="background:${scoreBg(latest.score)};padding:1px 8px;border-radius:4px;color:${Math.abs(latest.score)>40?'#fff':'inherit'}">${latest.score}</b></span>
      <span>当日涨跌幅：<span class="${pctClass(latest.change_pct)}"><b>${fmtPct(latest.change_pct)}</b></span></span>
      <span>历史天数：<b>${series.length}</b></span>
      ${bestIdx?`<span>关联指数：<b style="color:var(--accent2)">${esc(bestIdx.name)}</b>（相关系数 r=${bestR.toFixed(2)}）</span>`:''}
    </div>
  </div>`;
  document.getElementById('corrNote').innerHTML = bestIdx
    ? `图中橙色虚线为关联度最高的指数 <b>${esc(bestIdx.name)}</b> 涨跌幅（右轴），板块情绪分（左轴）与该指数相关系数 r=<b>${bestR.toFixed(2)}</b>。`
    : '指数历史数据不足，无法计算关联度。';

  // 画图
  if(chartObj){ chartObj.destroy(); chartObj=null; }
  const ctx=document.getElementById('chart').getContext('2d');
  const datasets=[{
    label:'板块情绪分', data:scores, borderColor:'#2b6cb0', backgroundColor:'rgba(43,108,176,.12)',
    fill:true, tension:.25, pointRadius:2.5, yAxisID:'y', borderWidth:2,
  }];
  if(bestIdx){
    datasets.push({
      label:bestIdx.name+' 涨跌幅%', data:bestIdxSeries, borderColor:'#dd6b20',
      backgroundColor:'rgba(221,107,32,.08)', borderDash:[6,4], tension:.25,
      pointRadius:2, yAxisID:'y1', borderWidth:2, spanGaps:true,
    });
  }
  chartObj=new Chart(ctx,{
    type:'line',
    data:{ labels:dates, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',labels:{font:{size:12}}},
        tooltip:{
          callbacks:{
            title:(items)=>items[0].label,
            label:(c)=>{
              const v=c.raw; if(v===null) return c.dataset.label+': 无数据';
              if(c.dataset.yAxisID==='y1') return c.dataset.label+': '+v.toFixed(2)+'%';
              return c.dataset.label+': '+v;
            }
          }
        }
      },
      scales:{
        x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},
        y:{type:'linear',position:'left',min:-100,max:100,title:{display:true,text:'情绪分 (-100~100)'}},
        y1:{type:'linear',position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'指数涨跌幅 %'}}
      }
    }
  });
}

// ---------- 事件绑定 ----------
document.querySelectorAll('.tabs button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById('tab-'+b.dataset.tab).classList.add('active'); };
});
const input=document.getElementById('sectorInput');
input.oninput=()=>{ showSuggest(input.value.trim()); };
input.onkeydown=(e)=>{ if(e.key==='Enter'){ document.getElementById('suggest').style.display='none'; doQuery(); } };
document.getElementById('queryBtn').onclick=()=>{ document.getElementById('suggest').style.display='none'; doQuery(); };
document.getElementById('filterInput').oninput=(e)=>{ renderAll(e.target.value.trim()); };
document.addEventListener('click',(e)=>{ if(!e.target.closest('.query-box')) document.getElementById('suggest').style.display='none'; });

// ---------- 初始化 ----------
renderHead();
if(D.latest){
  renderTable(D.latest.top10, document.getElementById('top10'));
  renderTable(D.latest.bottom10, document.getElementById('bottom10'));
  renderAll('');
} else {
  document.getElementById('top10').innerHTML='<div class="empty">暂无数据，请先执行采集（python -m src.main collect）</div>';
}
</script>
</body>
</html>
